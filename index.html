<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Emoji ASCII Renderer</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body { margin:0; background:#111; color:#eee; font-family:system-ui,-apple-system,Segoe UI,sans-serif; display:grid; grid-template-columns:340px 1fr; min-height:100vh; }
  aside { padding:18px; background:#181818; border-right:1px solid #333; }
  label { display:grid; gap:5px; margin:12px 0; font-size:13px; }
  label.check { display:flex; align-items:center; gap:8px; }
  input[type="range"] { width:100%; }
  input[type="text"], textarea, select { width:100%; box-sizing:border-box; padding:8px; font-size:14px; background:#262626; color:#fff; border:1px solid #555; border-radius:8px; font-family:inherit; }
  #emoji { flex:1; min-width:0; font-size:22px; text-align:center; line-height:1.3; min-height:52px; resize:vertical; }
  input[type="color"] { width:100%; height:34px; padding:0; border:1px solid #555; border-radius:8px; background:#262626; cursor:pointer; }
  input[type="file"] { width:100%; box-sizing:border-box; padding:6px; font-size:12px; color:#aaa; background:#262626; border:1px solid #555; border-radius:8px; }
  input[type="checkbox"] { width:16px; height:16px; }
  label:has(input:disabled), label:has(select:disabled) { opacity:.4; }
  button { margin-top:10px; width:100%; padding:10px; border:1px solid #555; background:#262626; color:#fff; border-radius:8px; cursor:pointer; }
  button:hover { background:#333; }

  /* emoji keyboard */
  .picker { position:relative; }
  .pickrow { display:flex; gap:6px; align-items:flex-start; }
  .iconbtn { margin-top:0; width:auto; flex:0 0 auto; padding:6px 12px; font-size:18px; }
  .panel { position:absolute; z-index:20; top:100%; left:0; right:0; margin-top:4px; max-height:280px; overflow-y:auto;
           background:#202020; border:1px solid #555; border-radius:8px; padding:6px;
           display:grid; grid-template-columns:repeat(8,1fr); gap:2px; box-shadow:0 8px 24px rgba(0,0,0,.5); }
  .panel.hidden { display:none; }
  .panel .cat { grid-column:1/-1; font-size:11px; color:#9a9a9a; padding:8px 4px 2px; }
  .panel button { margin:0; width:auto; padding:3px; border:none; background:transparent; font-size:20px; border-radius:6px; cursor:pointer; }
  .panel button:hover { background:#3a3a3a; }

  main { display:grid; place-items:center; overflow:auto; padding:24px; }
  canvas { max-width:min(92vh,92vw); max-height:92vh; background:black; box-shadow:0 0 40px rgba(255,255,255,.12); }
  .small { color:#aaa; font-size:12px; line-height:1.35; }
</style>
</head>
<body>
<aside>
  <h2>Emoji ASCII Renderer</h2>
  <p class="small">Type any text, add emoji with the 😀 button — or upload a photo — and render it as a glowing field of ASCII characters.</p>

  <label>Text
    <div class="picker">
      <div class="pickrow">
        <textarea id="emoji" rows="2" maxlength="500" autocomplete="off" spellcheck="false"
                  placeholder="Type text or add emoji 😀">🙂</textarea>
        <button id="emojiToggle" type="button" class="iconbtn" title="Add an emoji">😀</button>
      </div>
      <div id="emojiPanel" class="panel hidden"></div>
    </div>
  </label>
  <label class="check"><input id="wordWrap" type="checkbox"> Word wrap (auto-wrap long lines)</label>

  <label>Photo (optional — replaces the emoji)
    <div class="pickrow">
      <input id="photo" type="file" accept="image/*">
      <button id="photoClear" type="button" class="iconbtn" title="Remove photo, back to emoji" hidden>✕</button>
    </div>
  </label>

  <label>Letter size <span id="fontSizeVal"></span><input id="fontSize" type="range" min="8" max="30" value="18"></label>
  <label>Density <span id="densityVal"></span><input id="density" type="range" min="35" max="100" value="85"></label>
  <label>Contrast <span id="contrastVal"></span><input id="contrast" type="range" min="0" max="100" value="35"></label>
  <label>Aura strength <span id="auraVal"></span><input id="aura" type="range" min="0" max="100" value="62"></label>
  <label>Canvas size <span id="canvasSizeVal"></span><input id="canvasSize" type="range" min="1000" max="3000" value="2200" step="100"></label>
  <label>Seed <span id="seedVal"></span><input id="seed" type="range" min="1" max="9999" value="2026"></label>

  <label>Characters
    <select id="charset">
      <option value="matrix">Matrix mix (letters + symbols)</option>
      <option value="binary">Binary (0 / 1)</option>
      <option value="katakana">Katakana</option>
      <option value="blocks">Block shades</option>
      <option value="custom">Custom…</option>
    </select>
  </label>
  <label>Custom characters <input id="customChars" type="text" placeholder="e.g. @#%*+=-:." autocomplete="off"></label>

  <label>Text mode
    <select id="textMode">
      <option value="random">Random characters</option>
      <option value="words">Spell out words</option>
      <option value="hidden">Hidden words</option>
    </select>
  </label>
  <label>Words / message <input id="message" type="text" placeholder="e.g. you are loved" autocomplete="off"></label>

  <label class="check"><input id="emojiColors" type="checkbox" checked> Use original colors</label>
  <label>Color <input id="color" type="color" value="#ffd200"></label>
  <label class="check"><input id="transparentBg" type="checkbox"> Transparent background (PNG)</label>

  <button id="renderBtn">Render</button>
  <button id="randomBtn">Randomize seed</button>
  <label class="check"><input id="animate" type="checkbox"> Animate (cycle seeds)</label>
  <button id="downloadBtn">Download JPG (under 1 MB)</button>
  <button id="downloadPngBtn">Download PNG</button>
  <button id="copyTextBtn">Copy as text</button>
  <button id="copyLinkBtn">Copy share link</button>
  <button id="webmBtn">Export animation (WebM)</button>
  <button id="gifBtn">Export animation (GIF)</button>
</aside>

<main><canvas id="c" width="2200" height="2200"></canvas></main>

<script>
const $ = id => document.getElementById(id);
const canvas = $("c");
const ctx = canvas.getContext("2d");

function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

const CHARSETS = {
  matrix: "01ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz#$%&*+-=<>?/{}[]",
  binary: "01",
  katakana: "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789Z:･=*+-<>",
  blocks: "█▓▒░▄▀▌▐■□▪",
};
// Array.from so custom input can contain emoji/astral characters safely.
function activeChars() {
  if ($("charset").value === "custom") {
    const custom = Array.from($("customChars").value);
    if (custom.length) return custom;
  }
  return Array.from(CHARSETS[$("charset").value] || CHARSETS.matrix);
}

const EMOJI_FONT = '"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';

// Uploaded photo (replaces the emoji as the rendered source while set).
let uploadedImage = null;
$("photo").addEventListener("change", () => {
  const file = $("photo").files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    uploadedImage = img;
    $("photoClear").hidden = false;
    $("wordWrap").disabled = true; // a photo has no text to wrap
    render();
  };
  img.src = URL.createObjectURL(file);
});
$("photoClear").addEventListener("click", () => {
  uploadedImage = null;
  $("photo").value = "";
  $("photoClear").hidden = true;
  $("wordWrap").disabled = false;
  render();
});

// --- color helpers: derive a tint/shade palette from one picked color ---
function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function scale(rgb, f) { return rgb.map(c => Math.round(Math.min(255, c * f))); }       // f<1 darker
function mix(rgb, other, t) { return rgb.map((c, i) => Math.round(c + (other[i] - c) * t)); } // toward `other`
const rgb = c => `rgb(${c[0]},${c[1]},${c[2]})`;
const rgbi = c => `rgb(${Math.min(255,Math.round(c[0]))},${Math.min(255,Math.round(c[1]))},${Math.min(255,Math.round(c[2]))})`;
const rgba = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a})`;

// Brightness multiplier for a pixel of luminance L (0..1). Pivots around a high
// point so darks get pushed down hard while brights lift only slightly — i.e.
// "make the dark areas darker." c is the contrast amount (0..1).
function contrastMul(L, c) {
  if (c <= 0) return 1;
  const pivot = 0.60;
  const gainDown = 1 + c * 2.0; // below pivot: strong darkening
  const gainUp   = 1 + c * 0.5; // above pivot: gentle brightening
  let Lp = pivot + (L - pivot) * (L < pivot ? gainDown : gainUp);
  Lp = Lp < 0 ? 0 : Lp > 1 ? 1 : Lp;
  return L > 0.004 ? Lp / L : 0;
}

// Greedily break `text` into lines that fit `maxW` at the current font, breaking
// at spaces when possible (word wrap) and hard-breaking long runs (e.g. a wall
// of emoji with no spaces) so nothing overflows.
function wrapLines(c, text, maxW) {
  const lines = [];
  let line = "";
  for (const g of Array.from(text)) {
    const test = line + g;
    if (line !== "" && c.measureText(test).width > maxW) {
      const sp = line.lastIndexOf(" ");
      if (sp >= 0) { lines.push(line.slice(0, sp)); line = line.slice(sp + 1) + g; }
      else { lines.push(line); line = g; }
    } else {
      line = test;
    }
  }
  if (line !== "") lines.push(line);
  return lines;
}

// Break `text` into display lines and pick the largest font size whose block
// fits the buffer. Explicit newlines always break; `wrap` additionally wraps any
// line too wide to fit. Returns the chosen font size and the laid-out lines.
function layoutText(c, text, buf, wrap) {
  const maxW = buf * 0.92, maxH = buf * 0.92, lineH = 1.15;
  const paras = text.split("\n");
  const linesAt = fontPx => {
    c.font = fontPx + "px " + EMOJI_FONT;
    let lines = [];
    for (const p of paras) lines = lines.concat(wrap ? wrapLines(c, p, maxW) : [p]);
    return lines.length ? lines : [""];
  };
  const fits = fontPx => {
    const lines = linesAt(fontPx);
    if (lines.length * fontPx * lineH > maxH) return false;
    c.font = fontPx + "px " + EMOJI_FONT;
    return lines.every(l => c.measureText(l).width <= maxW);
  };
  let lo = 6, hi = buf, best = 6;
  while (hi - lo > 1) {
    const mid = (lo + hi) >> 1;
    if (fits(mid)) { best = mid; lo = mid; } else hi = mid;
  }
  return { fontPx: best, lines: linesAt(best), lineH };
}

// Rasterize the source (emoji/text, or the uploaded photo) into a small square
// buffer. blurPx softens it for the glow; tint recolors the silhouette for
// mono mode. Text is laid out across multiple lines (explicit newlines, plus
// optional word wrap) and sized to fill the buffer.
function makeSourceBuffer(emoji, buf, scaleFrac, blurPx, tint, wrap) {
  const o = document.createElement("canvas");
  o.width = o.height = buf;
  const c = o.getContext("2d", { willReadFrequently: true });
  if (blurPx) c.filter = `blur(${blurPx}px)`;
  if (uploadedImage) {
    const f = (buf * 0.92) / Math.max(uploadedImage.width, uploadedImage.height);
    const w = uploadedImage.width * f, h = uploadedImage.height * f;
    c.drawImage(uploadedImage, (buf - w) / 2, (buf - h) / 2, w, h);
  } else {
    c.textAlign = "center";
    c.textBaseline = "middle";
    const { fontPx, lines, lineH } = layoutText(c, emoji, buf, wrap);
    c.font = fontPx + "px " + EMOJI_FONT;
    const step = fontPx * lineH;
    let y = buf / 2 - (lines.length - 1) * step / 2;
    for (const l of lines) { c.fillText(l, buf / 2, y); y += step; }
  }
  c.filter = "none";
  if (tint) {
    c.globalCompositeOperation = "source-in"; // keep alpha, replace color
    c.fillStyle = tint;
    c.fillRect(0, 0, buf, buf);
    c.globalCompositeOperation = "source-over";
  }
  return { cv: o, px: c.getImageData(0, 0, buf, buf).data };
}

// Tight bounding box of the non-transparent pixels, so we can recenter the
// emoji no matter how its glyph happens to sit in the font's box.
function contentBounds(px, buf) {
  let minX = buf, minY = buf, maxX = -1, maxY = -1;
  for (let y = 0; y < buf; y++) {
    for (let x = 0; x < buf; x++) {
      if (px[(y * buf + x) * 4 + 3] > 16) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
    }
  }
  if (maxX < minX) return { minX: 0, minY: 0, maxX: buf - 1, maxY: buf - 1 }; // nothing drawn
  return { minX, minY, maxX, maxY };
}

// seedOverride lets the animation exporter drive frames without touching the
// slider; it's also the event object when used directly as a listener, so
// only honor it when it's an actual number.
function render(seedOverride) {
  const S = +$("canvasSize").value;
  canvas.width = S;
  canvas.height = S;

  const fontSize = +$("fontSize").value;
  const density = +$("density").value / 100;
  const contrast = +$("contrast").value / 100;
  const aura = +$("aura").value / 100;
  const seed = Number.isFinite(seedOverride) ? seedOverride : +$("seed").value;
  const emoji = $("emoji").value || "🙂";
  const useEmojiColors = $("emojiColors").checked;
  const glyphs = activeChars();

  const wordWrap = $("wordWrap").checked; // wraps the source text/emoji up top
  const mode = $("textMode").value;
  const message = $("message").value;
  const msgChars = Array.from(message);
  const words = message.split(/\s+/).filter(Boolean);
  let msgIdx = 0;

  // Palette (used when "Use original colors" is off).
  const base   = hexToRgb($("color").value);
  const pLight = mix(base, [255,255,255], 0.55);
  const pBase  = base;
  const pMid   = scale(base, 0.82);
  const pDim   = scale(base, 0.62);
  const pDark  = scale(base, 0.45);
  const pDeep  = scale(base, 0.30);
  const pGlow  = mix(base, [255,255,255], 0.10);

  syncLabels();

  const rnd = mulberry32(seed);
  if ($("transparentBg").checked) {
    ctx.clearRect(0, 0, S, S);
  } else {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, S, S);
  }

  // Two rasterizations: a sharp one for coverage/color, a blurred one for the halo.
  const BUF = 256;
  const sharp = makeSourceBuffer(emoji, BUF, 0.72, 0, null, wordWrap);
  const glow  = makeSourceBuffer(emoji, BUF, 0.72, BUF * 0.05, useEmojiColors ? null : rgb(pBase), wordWrap);

  // Recenter on the emoji's actual pixels and scale it to ~80% of the canvas.
  const b = contentBounds(sharp.px, BUF);
  const bw = b.maxX - b.minX + 1, bh = b.maxY - b.minY + 1;
  const sFit = (S * 0.80) / Math.max(bw, bh);   // canvas px per buffer px
  const dx0 = (S - bw * sFit) / 2;              // top-left of content in canvas
  const dy0 = (S - bh * sFit) / 2;

  // Map a canvas coord to a buffer pixel, or null if outside the buffer.
  function samp(px, x, y) {
    const bx = b.minX + (x - dx0) / sFit;
    const by = b.minY + (y - dy0) / sFit;
    if (bx < 0 || by < 0 || bx >= BUF || by >= BUF) return null;
    const i = ((by | 0) * BUF + (bx | 0)) * 4;
    return [px[i], px[i + 1], px[i + 2], px[i + 3]];
  }

  // Soft shape-following halo behind the characters, aligned to the same transform.
  ctx.save();
  ctx.globalAlpha = 0.22 + 0.5 * aura;
  ctx.drawImage(glow.cv, dx0 - b.minX * sFit, dy0 - b.minY * sFit, BUF * sFit, BUF * sFit);
  ctx.restore();

  ctx.textBaseline = "top";
  ctx.font = fontSize + "px ui-monospace, Menlo, Consolas, monospace";
  const stepX = fontSize * 0.82;
  const stepY = fontSize * 1.28;

  ctx.shadowColor = useEmojiColors ? "rgba(255,240,210,.45)" : rgba(pGlow, 0.85);
  ctx.shadowBlur = 6 + aura * 12;

  // Pick the next character for a covered cell, honoring the text mode.
  let pending = [];
  function nextGlyph() {
    if (mode === "words" && msgChars.length) {
      return msgChars[msgIdx++ % msgChars.length];
    }
    if (mode === "hidden" && words.length) {
      if (pending.length === 0 && rnd() < 0.05) pending = Array.from(words[Math.floor(rnd() * words.length)]);
      if (pending.length) return pending.shift();
    }
    return glyphs[Math.floor(rnd() * glyphs.length)];
  }

  const textRows = []; // plain-text mirror of the canvas, for "Copy as text"
  for (let y = 0; y < S; y += stepY) {
    const offset = (Math.round(y / stepY) % 2) * stepX / 2; // brick offset
    pending = []; // don't let hidden words wrap across rows
    const row = [];
    for (let x = offset; x < S; x += stepX) {
      const s = samp(sharp.px, x, y);
      let cell = " ";

      if (s && s[3] > 60) {
        // Inside the emoji silhouette.
        if (rnd() < density) {
          const ch = nextGlyph();
          const roll = rnd();
          const lum = (0.299*s[0] + 0.587*s[1] + 0.114*s[2]) / 255;
          const m = contrastMul(lum, contrast);
          if (useEmojiColors) {
            let col = [s[0]*m, s[1]*m, s[2]*m];
            if (roll < 0.2) col = mix(col.map(Math.round), [255,255,255], 0.35);
            ctx.fillStyle = rgbi(col);
          } else {
            const pal = lum > 0.8 ? pLight : lum > 0.55 ? pBase : lum > 0.33 ? pMid : pDim;
            ctx.fillStyle = rgbi([pal[0]*m, pal[1]*m, pal[2]*m]);
          }
          ctx.fillText(ch, x, y);
          cell = ch;
        }
      } else {
        // Outside: scatter faint glyphs, more likely near the glowing edge.
        const gs = samp(glow.px, x, y);
        if (gs && gs[3] > 8 && rnd() < aura * (gs[3] / 255) * 0.5) {
          const ch = glyphs[Math.floor(rnd() * glyphs.length)];
          if (useEmojiColors) {
            ctx.fillStyle = rgba([gs[0], gs[1], gs[2]], 0.5);
          } else {
            ctx.fillStyle = rnd() < 0.5 ? rgba(pDark, 0.6) : rgba(pDeep, 0.45);
          }
          ctx.fillText(ch, x, y);
          cell = ch;
        }
      }
      row.push(cell);
    }
    textRows.push(row.join("").replace(/\s+$/, ""));
  }
  lastText = textRows.join("\n");

  ctx.shadowBlur = 0;
  updateHash();
}

let lastText = ""; // plain-text version of the last render

// --- shareable URLs: settings live in the hash, so a link reproduces the image ---
const HASH_IDS = ["emoji","fontSize","density","contrast","aura","canvasSize","seed","textMode","message","color","charset","customChars"];
const HASH_CHECKS = ["emojiColors","transparentBg","wordWrap"];
function updateHash() {
  if (uploadedImage) return; // an uploaded photo can't be encoded in a link
  const p = new URLSearchParams();
  HASH_IDS.forEach(id => p.set(id, $(id).value));
  HASH_CHECKS.forEach(id => p.set(id, $(id).checked ? 1 : 0));
  history.replaceState(null, "", "#" + p.toString());
}
function applyHash() {
  if (location.hash.length < 2) return;
  const p = new URLSearchParams(location.hash.slice(1));
  HASH_IDS.forEach(id => { if (p.has(id)) $(id).value = p.get(id); });
  HASH_CHECKS.forEach(id => { if (p.has(id)) $(id).checked = p.get(id) === "1"; });
}

// Pasting a share link into an already-open tab only changes the hash — no
// reload — so apply it live. (updateHash uses replaceState, which doesn't
// fire this event, so our own renders don't loop.)
window.addEventListener("hashchange", () => {
  applyHash();
  $("color").disabled = $("emojiColors").checked;
  $("message").disabled = $("textMode").value === "random";
  $("wordWrap").disabled = !!uploadedImage;
  $("customChars").disabled = $("charset").value !== "custom";
  syncLabels();
  render();
});

// Briefly swap a button's label to confirm an action.
function flash(btn, msg) {
  const old = btn.textContent;
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = old; }, 1200);
}

function syncLabels() {
  $("fontSizeVal").textContent = $("fontSize").value + "px";
  $("densityVal").textContent = $("density").value + "%";
  $("contrastVal").textContent = $("contrast").value + "%";
  $("auraVal").textContent = $("aura").value + "%";
  $("canvasSizeVal").textContent = $("canvasSize").value + "px";
  $("seedVal").textContent = $("seed").value;
}

// --- emoji keyboard ---
const EMOJI_GROUPS = {
  "Smileys": "😀 😃 😄 😁 😆 😅 😂 🤣 🙂 🙃 😉 😊 😇 🥰 😍 🤩 😘 😋 😜 🤪 🤗 🤔 🤐 😐 😑 😶 😏 😒 🙄 😬 😌 😔 😪 🤤 😴 😷 🤒 🤕 🤢 🤮 🥵 🥶 🥴 😵 🤯 🤠 🥳 😎 🤓 🧐 😕 🙁 😮 😲 🥺 😨 😰 😥 😢 😭 😱 😖 😞 😓 😩 😫 😤 😡 😠 🤬 😈 👿 💀 💩 🤡 👻 👽 🤖 😺 😹 😻 🙀",

// Insert `text` at the textarea's caret (or append), then restore focus/caret so
// the emoji keyboard behaves like typing.
function insertAtCursor(el, text) {
  const start = el.selectionStart ?? el.value.length;
  const end = el.selectionEnd ?? el.value.length;
  el.value = el.value.slice(0, start) + text + el.value.slice(end);
  const pos = start + text.length;
  el.focus();
  el.setSelectionRange(pos, pos);
}
function buildEmojiPicker() {
  const panel = $("emojiPanel");
  for (const [cat, list] of Object.entries(EMOJI_GROUPS)) {
    const h = document.createElement("div");
    h.className = "cat";
    h.textContent = cat;
    panel.appendChild(h);
    for (const e of list.split(/\s+/)) {
      if (!e) continue;
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = e;
      btn.addEventListener("click", () => {
        insertAtCursor($("emoji"), e); // add to the text at the caret; keep the keyboard open
        render();
      });
      panel.appendChild(btn);
    }
  }
}

function scheduleRender() {

  renderTimer = setTimeout(render, 140);
}

// Approximate decoded byte size of a data URL (base64 is ~4/3 of the raw bytes).
function dataURLBytes(url) {
  const i = url.indexOf(",");
  return Math.floor((url.length - i - 1) * 0.75);
}

// PNG of this noisy text is several MB; JPEG compresses it far better. Step
// quality down — and finally scale the canvas down — until it fits the limit.
function exportUnderLimit(maxBytes) {
  const quals = [0.92, 0.85, 0.78, 0.7, 0.6, 0.5, 0.4];
  let scaleF = 1, last = null;
  for (let pass = 0; pass < 6; pass++) {
    let src = canvas;
    if (scaleF < 0.999) {
      const off = document.createElement("canvas");
      off.width = Math.max(1, Math.round(canvas.width * scaleF));
      off.height = Math.max(1, Math.round(canvas.height * scaleF));
      const octx = off.getContext("2d");
      octx.fillStyle = "#000";
      octx.fillRect(0, 0, off.width, off.height);
      octx.drawImage(canvas, 0, 0, off.width, off.height);
      src = off;
    }
    for (const q of quals) {
      const url = src.toDataURL("image/jpeg", q);
      last = url;
      if (dataURLBytes(url) <= maxBytes) return url;
    }
    scaleF *= 0.85;
  }
  return last; // smallest we could produce
}

// Record N seed-advancing frames off the live canvas into a WebM (or MP4 where
// that's what MediaRecorder supports, e.g. Safari).
$("webmBtn").addEventListener("click", async () => {
  const btn = $("webmBtn");
  const mime = ["video/webm;codecs=vp9", "video/webm", "video/mp4"]
    .find(t => window.MediaRecorder && MediaRecorder.isTypeSupported(t));
  if (!mime) { flash(btn, "Not supported in this browser"); return; }
  btn.disabled = true;
  const fps = 10, frames = 40;
  const rec = new MediaRecorder(canvas.captureStream(fps), { mimeType: mime, videoBitsPerSecond: 10_000_000 });
  const chunks = [];
  rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  const stopped = new Promise(res => { rec.onstop = res; });
  rec.start();
  const seed0 = +$("seed").value;
  for (let i = 0; i < frames; i++) {
    render(((seed0 + i - 1) % 9999) + 1);
    btn.textContent = `Recording ${i + 1}/${frames}…`;
    await new Promise(r => setTimeout(r, 1000 / fps));
  }
  rec.stop();
  await stopped;
  render(seed0);
  const a = document.createElement("a");
  a.download = "emoji-ascii-anim." + (mime.includes("mp4") ? "mp4" : "webm");
  a.href = URL.createObjectURL(new Blob(chunks, { type: mime }));
  a.click();
  btn.disabled = false;
  btn.textContent = "Export animation (WebM)";
});

// --- Self-contained GIF89a encoder (no libraries, keeps this a single file) ---

// Median-cut quantization: split the color space into `maxColors` boxes and
// average each. `samples` is a flat RGBA array (alpha ignored).
function quantizePixels(samples, maxColors) {
  const all = [];
  for (let i = 0; i < samples.length; i += 4) all.push([samples[i], samples[i+1], samples[i+2]]);
  if (!all.length) all.push([0,0,0]);
  const boxes = [all];
  while (boxes.length < maxColors) {
    let bi = -1, bestRange = 0, bestCh = 0;
    for (let i = 0; i < boxes.length; i++) {
      const box = boxes[i];
      if (box.length < 2) continue;
      const mn = [255,255,255], mx = [0,0,0];
      for (const p of box) for (let c = 0; c < 3; c++) {
        if (p[c] < mn[c]) mn[c] = p[c];
        if (p[c] > mx[c]) mx[c] = p[c];
      }
      for (let c = 0; c < 3; c++) {
        const r = mx[c] - mn[c];
        if (r > bestRange) { bestRange = r; bi = i; bestCh = c; }
      }
    }
    if (bi < 0) break; // every box is a single color
    const box = boxes[bi];
    box.sort((a, b) => a[bestCh] - b[bestCh]);
    const mid = box.length >> 1;
    boxes.splice(bi, 1, box.slice(0, mid), box.slice(mid));
  }
  const palette = boxes.map(box => {
    const s = [0,0,0];
    for (const p of box) { s[0]+=p[0]; s[1]+=p[1]; s[2]+=p[2]; }
    const n = box.length || 1;
    return [Math.round(s[0]/n), Math.round(s[1]/n), Math.round(s[2]/n)];
  });
  while (palette.length < maxColors) palette.push([0,0,0]);
  return palette.slice(0, maxColors);
}

// Nearest-palette-color lookup, cached by packed RGB (huge win on flat areas).
function makeMapper(palette) {
  const cache = new Map();
  return (r, g, b) => {
    const key = (r << 16) | (g << 8) | b;
    const hit = cache.get(key);
    if (hit !== undefined) return hit;
    let best = 0, bestD = Infinity;
    for (let i = 0; i < palette.length; i++) {
      const p = palette[i];
      const dr = r - p[0], dg = g - p[1], db = b - p[2];
      const d = dr*dr + dg*dg + db*db;
      if (d < bestD) { bestD = d; best = i; }
    }
    cache.set(key, best);
    return best;
  };
}

// GIF variant of LZW: variable-width codes with clear/EOI. The decoder builds
// its table one code behind the encoder, so the width must bump when `next`
// *exceeds* 2^codeSize (not when it equals it) or the streams desync after the
// first bump. Reset the table once it fills (code 4095).
function lzwEncode(minCode, indices) {
  const CLEAR = 1 << minCode, EOI = CLEAR + 1;
  let codeSize = minCode + 1, next = EOI + 1, dict = new Map();
  const out = [];
  let cur = 0, curBits = 0;
  const emit = code => {
    cur |= code << curBits; curBits += codeSize;
    while (curBits >= 8) { out.push(cur & 255); cur >>= 8; curBits -= 8; }
  };
  const codeOf = s => dict.has(s) ? dict.get(s) : (+s); // single symbols are literal indices
  emit(CLEAR);
  let prefix = "" + indices[0];
  for (let i = 1; i < indices.length; i++) {
    const k = indices[i];
    const comb = prefix + "," + k;
    if (dict.has(comb)) { prefix = comb; continue; }
    emit(codeOf(prefix));
    dict.set(comb, next++);
    if (next === 4096) {
      emit(CLEAR); dict = new Map(); codeSize = minCode + 1; next = EOI + 1;
    } else if (next > (1 << codeSize) && codeSize < 12) {
      codeSize++;
    }
    prefix = "" + k;
  }
  emit(codeOf(prefix));
  emit(EOI);
  if (curBits > 0) out.push(cur & 255);
  return out;
}

// Wrap packed bytes into GIF's length-prefixed 255-byte sub-blocks.
function subBlocks(bytes) {
  const out = [];
  for (let i = 0; i < bytes.length; i += 255) {
    const chunk = bytes.slice(i, i + 255);
    out.push(chunk.length);
    for (const b of chunk) out.push(b);
  }
  out.push(0);
  return out;
}

// Assemble a looping GIF from frame index-streams sharing one 256-color palette.
function buildGif(frames, w, h, palette, delayCs) {
  const bytes = [];
  const push = (...b) => { for (const x of b) bytes.push(x & 255); };
  const pushStr = s => { for (let i = 0; i < s.length; i++) bytes.push(s.charCodeAt(i)); };
  const short = n => push(n & 255, (n >> 8) & 255);

  pushStr("GIF89a");
  short(w); short(h);
  push(0xF7, 0x00, 0x00);                 // 256-entry global color table, bg 0, aspect 0
  for (let i = 0; i < 256; i++) { const c = palette[i] || [0,0,0]; push(c[0], c[1], c[2]); }
  push(0x21, 0xFF, 0x0B); pushStr("NETSCAPE2.0"); push(0x03, 0x01, 0x00, 0x00, 0x00); // loop forever

  for (const idx of frames) {
    push(0x21, 0xF9, 0x04, 0x00); short(delayCs); push(0x00, 0x00); // graphic control (delay)
    push(0x2C); short(0); short(0); short(w); short(h); push(0x00); // image descriptor
    push(0x08);                                                     // LZW min code size
    for (const b of subBlocks(lzwEncode(0x08, idx))) bytes.push(b);
  }
  push(0x3B); // trailer
  return new Uint8Array(bytes);
}

// Render seed-advancing frames, downscale, quantize to a shared palette, encode.
$("gifBtn").addEventListener("click", async () => {
  const btn = $("gifBtn");
  btn.disabled = true;
  const fps = 12, frames = 20, delayCs = Math.round(100 / fps);
  const cap = 480;                                   // downscale so LZW/quantize stay quick
  const scaleF = Math.min(1, cap / canvas.width);
  const w = Math.max(1, Math.round(canvas.width * scaleF));
  const h = Math.max(1, Math.round(canvas.height * scaleF));
  const off = document.createElement("canvas");
  off.width = w; off.height = h;
  const octx = off.getContext("2d", { willReadFrequently: true });
  const seed0 = +$("seed").value;
  const framePixels = [];
  try {
    for (let i = 0; i < frames; i++) {
      render(((seed0 + i - 1) % 9999) + 1);
      octx.fillStyle = "#000";                        // GIF has no soft alpha — bake onto black
      octx.fillRect(0, 0, w, h);
      octx.drawImage(canvas, 0, 0, w, h);
      framePixels.push(octx.getImageData(0, 0, w, h).data);
      btn.textContent = `Rendering ${i + 1}/${frames}…`;
      await new Promise(r => setTimeout(r, 0));
    }
    render(seed0);

    btn.textContent = "Quantizing…";
    await new Promise(r => setTimeout(r, 0));
    const sample = [];
    const stride = Math.max(1, Math.floor((w * h * frames) / 30000)) * 4;
    for (const data of framePixels)
      for (let i = 0; i < data.length; i += stride) sample.push(data[i], data[i+1], data[i+2], 255);
    const palette = quantizePixels(sample, 256);
    const mapper = makeMapper(palette);

    const frameIdx = framePixels.map((data, fi) => {
      const idx = new Uint8Array(w * h);
      for (let p = 0, j = 0; p < data.length; p += 4, j++) idx[j] = mapper(data[p], data[p+1], data[p+2]);
      btn.textContent = `Encoding ${fi + 1}/${frames}…`;
      return idx;
    });

    btn.textContent = "Writing GIF…";
    await new Promise(r => setTimeout(r, 0));
    const gif = buildGif(frameIdx, w, h, palette, delayCs);
    const a = document.createElement("a");
    a.download = "emoji-ascii-anim.gif";
    a.href = URL.createObjectURL(new Blob([gif], { type: "image/gif" }));
    a.click();
  } catch (err) {
    console.error(err);
    flash(btn, "GIF export failed");
  } finally {
    btn.disabled = false;
    btn.textContent = "Export animation (GIF)";
  }
});
